name: "Feature request"
description: "Propose a new capability or improvement."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement.
  - type: textarea
    id: problem
    attributes:
      label: "What problem or use case are you trying to address?"
      description: "Describe the problem this request would solve."
      placeholder: "A clear and concise description of the problem."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "What change would you like to see?"
      description: "Describe the capability or improvement you want."
      placeholder: "Describe the solution you want."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "What alternatives have you considered?"
      description: "Mention related approaches, prior attempts, or tradeoffs."
      placeholder: "Describe any alternatives you have considered."
    validations:
      required: false
