name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: Describe the problem or use case.
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe the solution you'd like
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Mention related approaches, prior attempts, or tradeoffs.
      placeholder: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
