name: "Bug report"
description: "Report a reproducible problem in the workspace or a plugin."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "What did you observe?"
      placeholder: "Tell us what you saw."
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: "What did you expect to happen?"
      placeholder: "Tell us what you expected instead."
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Steps to reproduce"
      description: "How can someone reproduce the issue?"
      placeholder: |
        1. Go to ...
        2. Configure ...
        3. Trigger ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Include OS, Stream Deck version, plugin version, and any relevant setup details."
    validations:
      required: true
