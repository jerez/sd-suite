name: Release plugins

on:
  push:
    branches: [main]
    paths:
      - "apps/*/package.json"

permissions:
  contents: write

concurrency:
  group: release-plugins-${{ github.sha }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan plugin releases
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.plan.outputs.native }}
      plugins: ${{ steps.plan.outputs.plugins }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release plan
        id: plan
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          plan_file="$RUNNER_TEMP/plugin-release-plan.json"
          pnpm --silent release:plan --base "$BASE_SHA" --head "$HEAD_SHA" > "$plan_file"
          echo "native=$(jq -c '.native' "$plan_file")" >> "$GITHUB_OUTPUT"
          echo "plugins=$(jq -c '.plugins' "$plan_file")" >> "$GITHUB_OUTPUT"

  native:
    name: Native ${{ matrix.release.name }} (${{ matrix.release.platform }})
    needs: plan
    if: ${{ needs.plan.outputs.native != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJSON(needs.plan.outputs.native) }}
    runs-on: ${{ matrix.release.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify native release output
        run: pnpm turbo run release:native --filter="${{ matrix.release.name }}"

      - name: Archive native release output
        shell: bash
        env:
          NATIVE_PLATFORM: ${{ matrix.release.platform }}
          PLUGIN_PATH: ${{ matrix.release.path }}
        run: |
          mkdir -p "$RUNNER_TEMP/native-artifact"
          tar -C "$PLUGIN_PATH/.native" -czf "$RUNNER_TEMP/native-artifact/$NATIVE_PLATFORM.tar.gz" "$NATIVE_PLATFORM"

      - name: Upload native release output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release.artifact }}
          path: ${{ runner.temp }}/native-artifact/${{ matrix.release.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  package:
    name: Package ${{ matrix.release.name }} ${{ matrix.release.version }}
    needs: [plan, native]
    if: ${{ always() && needs.plan.result == 'success' && needs.native.result != 'failure' && needs.plan.outputs.plugins != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJSON(needs.plan.outputs.plugins) }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native release output
        if: ${{ matrix.release.hasNative }}
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.release.nativeArtifactPattern }}
          path: ${{ runner.temp }}/native-artifacts
          merge-multiple: true

      - name: Restore native release output
        if: ${{ matrix.release.hasNative }}
        shell: bash
        env:
          PLUGIN_PATH: ${{ matrix.release.path }}
        run: |
          mkdir -p "$PLUGIN_PATH/.native"
          for archive in "$RUNNER_TEMP"/native-artifacts/*.tar.gz; do
            tar -C "$PLUGIN_PATH/.native" -xzf "$archive"
          done

      - name: Stage native release output
        if: ${{ matrix.release.hasNative }}
        run: pnpm turbo run native:stage --filter="${{ matrix.release.name }}"

      - name: Build and package plugin
        run: pnpm turbo run pack --filter="${{ matrix.release.name }}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER: ${{ matrix.release.path }}/${{ matrix.release.installer }}
          PLUGIN_NAME: ${{ matrix.release.name }}
          PLUGIN_VERSION: ${{ matrix.release.version }}
          RELEASE_TAG: ${{ matrix.release.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$INSTALLER" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "$INSTALLER" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$PLUGIN_NAME $PLUGIN_VERSION"
          fi
