name: CI

on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build and validate plugins
        run: pnpm plugin:validate

  native-macos:
    name: Native bridge (macOS)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native bridge
        run: pnpm native:build --filter=audio-source

      - name: Validate native bridge
        run: pnpm --filter audio-source native:validate

      - name: Test native bridge
        run: pnpm --filter audio-source native:test

  native-windows:
    name: Native bridge (Windows)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native bridge
        run: pnpm native:build --filter=audio-source

      - name: Validate native bridge
        run: pnpm --filter audio-source native:validate

      - name: Test native bridge
        run: pnpm --filter audio-source native:test

      - name: Smoke test Windows audio integration
        run: pnpm --filter audio-source native:test:integration
